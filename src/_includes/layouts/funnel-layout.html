<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>{{ title }} | Next Frontier Financial Services</title>
  <meta name="description" content="{{ description }}">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://nextfrontierfinancial.com{{ page.url }}">
  
  <meta property="og:site_name" content="Next Frontier Financial Services">
  <meta property="og:title" content="{{ title }}">
  <meta property="og:description" content="{{ description }}">
  <meta property="og:type" content="article">
  <meta property="og:url" content="https://nextfrontierfinancial.com{{ page.url }}">
  {% if thumbnail %}
    <meta property="og:image" content="https://nextfrontierfinancial.com{{ thumbnail }}">
  {% endif %}

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">

  <style>
    :root {
      --charcoal: #232B2B;
      --dark-sage: #4A5D4E;
      --sage: #7A9A82;
      --light-sand: #F9F8F6;
    }

    body {
      background-color: var(--light-sand);
      color: var(--charcoal);
      font-family: 'Inter', sans-serif;
      line-height: 1.7;
      margin: 0;
      padding: 0;
    }

    main {
      max-width: 800px;
      margin: 4rem auto;
      padding: 0 1.5rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.75rem;
      color: var(--charcoal);
      line-height: 1.2;
      margin-bottom: 2rem;
      text-align: center;
    }

    .blog-content p {
      font-size: 1.1rem;
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>

  <main>
    <article>
      <h1>{{ title }}</h1>
      
      <div class="blog-content">
        {{ content | safe }}
      </div>
    </article>
  </main>

</body>
</html>
